[package]
name = "grafeo-loro"
version = "0.1.0"
edition = "2021"

[dependencies]
grafeo = "0.5"
loro = "1.0"
lorosurgeon = "0.3"
tokio = { version = "1", features = ["sync", "rt-multi-thread", "macros", "time", "fs"] }
parking_lot = "0.12"
rayon = "1.8"
lz4_flex = "0.11"
zstd = "0.13"
serde = { version = "1", features = ["derive"] }
async-trait = "0.1"
thiserror = "1"
opentelemetry = "0.23"